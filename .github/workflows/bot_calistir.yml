name: SABIS Not Kontrol Botu

on:
  schedule:
    - cron: '*/45 * * * *' 
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest 
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v3

    - name: Python Kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Kütüphaneleri Yükle (requirements.txt)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Botu Ateşle
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        SABIS_NO: ${{ secrets.SABIS_NO }}
        SABIS_SIFRE: ${{ secrets.SABIS_SIFRE }}
      run: python main.py